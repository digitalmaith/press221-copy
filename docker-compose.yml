version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: press221_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: s@uveur25
      POSTGRES_DB: press221
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: press221_api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:s%40uveur25@db:5432/press221
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
